name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - staging
      - trying

env:
  RUSTFLAGS: -Dwarnings

jobs:
  build_and_test:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@master

    - name: Run sccache-cache only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Set Rust caching env vars only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Install ${{ matrix.rust }}
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        override: true

    - name: Install sqlite3def
      run: cargo xtask sql install

    - name: Run xtask test
      run: cargo xtask test

  tracey:
    name: Spec coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Install tracey
      run: |
        curl --proto '=https' --tlsv1.2 -LsSf https://github.com/bearcove/tracey/releases/latest/download/tracey-installer.sh | sh

    - name: Run tracey
      run: tracey query validate

    - name: Check minimum spec coverage
      run: |
        coverage=$(tracey query status --json)
        total=$(echo "$coverage" | jq -e '.impls[0].totalRules') || { echo "::error::Failed to read totalRules from tracey output"; exit 1; }
        verified=$(echo "$coverage" | jq -e '.impls[0].verifiedRules') || { echo "::error::Failed to read verifiedRules from tracey output"; exit 1; }
        if [ "$total" -eq 0 ]; then
          echo "::error::No spec rules found"
          exit 1
        fi
        percent=$((verified * 100 / total))
        echo "Spec coverage: ${verified}/${total} (${percent}%)"
        if [ "$percent" -lt 60 ]; then
          echo "::error::Spec coverage ${percent}% is below the minimum threshold of 60%"
          exit 1
        fi

  check_docs:
    name: Checking docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Run sccache-cache only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Set Rust caching env vars only on non-release runs
      if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Docs
      run: cargo doc
