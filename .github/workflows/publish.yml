name: Publish

on:
  pull_request_target:
    types: [closed]
    branches: [main]

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Verify PR author
        if: github.event.pull_request.user.login != 'github-actions[bot]'
        run: |
          echo "::error::Release PRs must be created by github-actions[bot], not ${{ github.event.pull_request.user.login }}"
          exit 1

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "wasm") | .version')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Branch version ${{ steps.version.outputs.version }} does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

  build:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --package wasm

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/release
          tar czf ../../wasm-${{ matrix.target }}.tar.gz wasm
          cd ../..

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/wasm.exe -DestinationPath wasm-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.target }}
          path: wasm-${{ matrix.target }}.${{ matrix.archive }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: prepare
    environment: crates-io-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1

      # Tier 1: leaf crates with no inter-workspace dependencies
      - name: Publish wasm-detector
        run: cargo publish --package wasm-detector

      - name: Publish wasm-manifest
        run: cargo publish --package wasm-manifest

      - name: Publish wasm-meta-registry-client
        run: cargo publish --package wasm-meta-registry-client

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 2: depends on wasm-manifest + wasm-meta-registry-client
      - name: Publish wasm-package-manager
        run: cargo publish --package wasm-package-manager

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 3: depends on wasm-package-manager
      - name: Publish wasm-meta-registry
        run: cargo publish --package wasm-meta-registry

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 4: depends on wasm-detector + wasm-manifest + wasm-package-manager
      - name: Publish wasm
        run: cargo publish --package wasm

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare, build, publish]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag does not already exist
        id: check-tag
        run: |
          if git tag -l "v${{ needs.prepare.outputs.version }}" | grep -q .; then
            echo "::warning::Tag v${{ needs.prepare.outputs.version }} already exists, skipping tag creation"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check-tag.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          generate_release_notes: true
          files: release-assets/*

      # Force-update the major version tag (e.g. v0) so users pinned to
      # @v0 automatically receive the latest patch/minor release.
      - name: Update major version tag
        run: |
          MAJOR=$(echo "${{ needs.prepare.outputs.version }}" | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "v${MAJOR}"
          git push origin "v${MAJOR}" --force
