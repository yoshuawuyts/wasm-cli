name: Publish

# This workflow automates the release process using release-plz.
#
# How it works:
# 1. When code is pushed to main, the "release-pr" job creates or updates a release PR
#    with changelogs and version bumps based on conventional commits.
# 2. On every push to main, the "release" job runs release-plz idempotently — it only
#    publishes crates whose version in Cargo.toml is higher than what's on crates.io.
on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Enable OIDC for trusted publishing to crates.io
      contents: write
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Security: Don't persist credentials to prevent accidental leaks
          # See: https://release-plz.dev/docs/github/persist-credentials
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    # Always run release-pr on main to keep the release PR up to date
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Security: Don't persist credentials to prevent accidental leaks
          # See: https://release-plz.dev/docs/github/persist-credentials
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
