name: 'Run wasm CLI'
description: 'Run the wasm(1) unified WebAssembly developer tool in your GitHub Actions workflow'
author: 'yoshuawuyts'

inputs:
  command:
    description: 'The wasm subcommand to run (run, install, init, local, registry)'
    required: true
    default: 'run'
  input:
    description: 'For `wasm run`: local file path or OCI reference to the Wasm Component'
    required: false
    default: ''
  args:
    description: 'Additional arguments passed verbatim to the wasm command'
    required: false
    default: ''
  offline:
    description: 'Run in offline mode (--offline)'
    required: false
    default: 'false'
  color:
    description: 'When to use colored output: auto, always, or never (--color)'
    required: false
    default: 'auto'
  inherit-env:
    description: 'For `wasm run`: inherit all host environment variables (--inherit-env)'
    required: false
    default: 'false'
  inherit-network:
    description: 'For `wasm run`: allow the guest to access the network (--inherit-network)'
    required: false
    default: 'false'
  no-stdio:
    description: 'For `wasm run`: suppress stdin/stdout/stderr inheritance (--no-stdio)'
    required: false
    default: 'false'

outputs:
  exit-code:
    description: 'Exit code returned by the wasm command'
    value: ${{ steps.wasm.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Resolve version
      id: version
      shell: bash
      run: |
        ACTION_REF="${{ github.action_ref }}"
        if [[ "$ACTION_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "tag=$ACTION_REF" >> "$GITHUB_OUTPUT"
        else
          TAG=$(curl -sf https://api.github.com/repos/yoshuawuyts/wasm-cli/releases/latest \
            | jq -r '.tag_name // empty') || true
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Could not resolve latest release tag, falling back to cargo install"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Detect platform
      id: platform
      shell: bash
      run: |
        OS="${{ runner.os }}"
        ARCH="${{ runner.arch }}"
        case "${OS}-${ARCH}" in
          Linux-X64)    TARGET="x86_64-unknown-linux-gnu";     EXT="tar.gz" ;;
          Linux-ARM64)  TARGET="aarch64-unknown-linux-gnu";    EXT="tar.gz" ;;
          macOS-ARM64)  TARGET="aarch64-apple-darwin";         EXT="tar.gz" ;;
          Windows-X64)  TARGET="x86_64-pc-windows-msvc";      EXT="zip"    ;;
          *)
            echo "::warning::Unsupported platform ${OS}-${ARCH}, falling back to cargo install"
            echo "target=" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac
        echo "target=$TARGET" >> "$GITHUB_OUTPUT"
        echo "ext=$EXT" >> "$GITHUB_OUTPUT"

    - name: Cache wasm CLI binary
      if: steps.version.outputs.tag != '' && steps.platform.outputs.target != ''
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/wasm-cli
        key: wasm-cli-${{ steps.version.outputs.tag }}-${{ runner.os }}-${{ runner.arch }}

    - name: Download pre-built binary
      id: download
      if: >-
        steps.version.outputs.tag != '' &&
        steps.platform.outputs.target != '' &&
        steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        TARGET="${{ steps.platform.outputs.target }}"
        EXT="${{ steps.platform.outputs.ext }}"
        URL="https://github.com/yoshuawuyts/wasm-cli/releases/download/${TAG}/wasm-${TARGET}.${EXT}"
        DEST="${{ runner.tool_cache }}/wasm-cli"
        mkdir -p "$DEST"
        echo "Downloading $URL"
        if [[ "$EXT" == "tar.gz" ]]; then
          if ! curl -fsSL "$URL" | tar xz -C "$DEST"; then
            echo "::warning::Failed to download pre-built binary from $URL"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        else
          if ! curl -fsSL "$URL" -o /tmp/wasm.zip; then
            echo "::warning::Failed to download pre-built binary from $URL"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          unzip -o /tmp/wasm.zip -d "$DEST"
          rm -f /tmp/wasm.zip
        fi
        if [ -f "$DEST/wasm" ]; then
          chmod +x "$DEST/wasm"
        fi
        echo "ok=true" >> "$GITHUB_OUTPUT"

    - name: Add binary to PATH
      if: >-
        steps.version.outputs.tag != '' &&
        steps.platform.outputs.target != '' &&
        (steps.cache.outputs.cache-hit == 'true' || steps.download.outputs.ok == 'true')
      shell: bash
      run: echo "${{ runner.tool_cache }}/wasm-cli" >> "$GITHUB_PATH"

    - name: Fallback to cargo install
      shell: bash
      run: |
        if ! command -v wasm &>/dev/null; then
          cargo install --git https://github.com/yoshuawuyts/wasm-cli.git wasm
        fi

    - name: Verify wasm is available
      shell: bash
      run: wasm --help > /dev/null

    - name: Run wasm
      id: wasm
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_INPUT: ${{ inputs.input }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_COLOR: ${{ inputs.color }}
        INPUT_INHERIT_ENV: ${{ inputs.inherit-env }}
        INPUT_INHERIT_NETWORK: ${{ inputs.inherit-network }}
        INPUT_NO_STDIO: ${{ inputs.no-stdio }}
      run: |
        args=()

        # Global options
        [ "$INPUT_OFFLINE" = "true" ] && args+=(--offline)
        [ "$INPUT_COLOR" != "auto" ] && args+=(--color "$INPUT_COLOR")

        # Subcommand
        args+=("$INPUT_COMMAND")

        # Positional input argument (e.g. file path or OCI reference for `wasm run`)
        [ -n "$INPUT_INPUT" ] && args+=("$INPUT_INPUT")

        # Flags for `wasm run`
        [ "$INPUT_INHERIT_ENV" = "true" ] && args+=(--inherit-env)
        [ "$INPUT_INHERIT_NETWORK" = "true" ] && args+=(--inherit-network)
        [ "$INPUT_NO_STDIO" = "true" ] && args+=(--no-stdio)

        # Additional verbatim arguments split on whitespace
        if [ -n "$INPUT_ARGS" ]; then
          read -ra extra_args <<< "$INPUT_ARGS"
          args+=("${extra_args[@]}")
        fi

        set +e
        wasm "${args[@]}"
        exit_code=$?
        set -e
        echo "exit-code=$exit_code" >> "$GITHUB_OUTPUT"
        exit $exit_code
